name: Build Android APK

on:
  workflow_dispatch: # تشغيل يدوي بضغطة زر

# تفعيل البيئة الحديثة لـ Node 24 وتخطي التحذيرات
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. تثبيت كافة الاعتماديات والبرامج المساعدة للأندرويد
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libffi-dev cmake
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      # 2. بناء الـ APK مع حفظ تفاصيل الأخطاء في ملف خارجي إذا فشل
      - name: Build with Buildozer
        run: |
          yes | buildozer -v android debug || (echo "=== BUILDOZER FAILED ===" && cat .buildozer/android/platform/build-*.log || true && exit 1)

      # 3. رفع ملف الـ APK الناتج في حال النجاح
      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DiagDiesel-APK
          path: bin/*.apk
