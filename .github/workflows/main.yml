name: Build Android APK

on:
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # استخدام أداة بناء حديثة ومستقرة بديلة للتي حُذفت
      - name: Build with Buildozer
        uses: ArtemSsh/buildozer-action@v1
        with:
          command: buildozer -v android debug
          repository_root: .

      # رفع ملف الـ APK باستخدام الإصدار v4 الحديث والمطلوب أمنياً
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiagDiesel-APK
          path: bin/*.apk
