name: Build Android APK

on:
  workflow_dispatch: # تشغيل يدوي بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. تثبيت كافة الاعتماديات والبرامج المساعدة للأندرويد مباشرة على السيرفر
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libffi-dev cmake
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      # 2. تنفيذ أمر بناء الـ APK مباشرة بواسطة أداة buildozer المثبتة
      - name: Build with Buildozer
        run: |
          yes | buildozer -v android debug

      # 3. رفع ملف الـ APK الناتج بالنسخة الحديثة v4
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiagDiesel-APK
          path: bin/*.apk
